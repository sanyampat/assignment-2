<!DOCTYPE html>
<html>
 
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Student</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .search-box { margin-top: 20px; }
        #results { margin-top: 8px; border: 1px solid #ddd; max-width: 420px; }
        .result-item { padding: 8px; cursor: pointer; border-bottom: 1px solid #eee; }
        .result-item:hover { background:#f5f5f5; }
 
        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.4); }
        .modal-content { background-color: #fff; margin: 10% auto; padding: 20px; border: 1px solid #888; width: 90%; max-width: 480px; border-radius: 6px; }
        .close { float: right; font-size: 20px; cursor: pointer; }
        .field { margin-bottom: 8px; }
    </style>
</head>
 
<body>
 
    <h1>Add Student</h1>
 
    <form action="/add_student" method="POST">
 
        <label>Name</label><br>
        <input type="text" name="name" required><br><br>
 
        <label>Age</label><br>
        <input type="number" name="age" required><br><br>
 
        <label>Course</label><br>
        <input type="text" name="course" required><br><br>
 
        <label>Email</label><br>
        <input type="email" name="email" required><br><br>
 
        <button type="submit">Add Student</button>
 
    </form>
 
    <div class="search-box">
        <h2>Search Students</h2>
        <input id="searchInput" type="search" placeholder="Type a name..." style="width:420px;padding:8px;">
        <div id="results" role="list"></div>
    </div>
 
    <!-- Modal -->
    <div id="studentModal" class="modal">
        <div class="modal-content">
            <span id="closeBtn" class="close">&times;</span>
            <h3 id="modalName">Student</h3>
            <div class="field"><strong>Age:</strong> <span id="modalAge"></span></div>
            <div class="field"><strong>Course:</strong> <span id="modalCourse"></span></div>
            <div class="field"><strong>Email:</strong> <span id="modalEmail"></span></div>
        </div>
    </div>
 
    <script>
        const input = document.getElementById('searchInput');
        const results = document.getElementById('results');
        const modal = document.getElementById('studentModal');
        const closeBtn = document.getElementById('closeBtn');
 
        let timeout = null;
 
        input.addEventListener('input', () => {
            clearTimeout(timeout);
            const q = input.value.trim();
            if (!q) { results.innerHTML = ''; return; }
            timeout = setTimeout(() => doSearch(q), 250);
        });
 
        function doSearch(q) {
            fetch('/search?q=' + encodeURIComponent(q))
                .then(r => r.json())
                .then(data => renderResults(data))
                .catch(err => { console.error(err); results.innerHTML = '' });
        }
 
        function renderResults(list) {
            if (!list || list.length === 0) { results.innerHTML = '<div style="padding:8px;color:#666">No results</div>'; return; }
            results.innerHTML = '';
            list.forEach(s => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.textContent = s.name + (s.course ? ' — ' + s.course : '');
                div.addEventListener('click', () => showModal(s));
                results.appendChild(div);
            });
        }
 
        function showModal(s) {
            document.getElementById('modalName').textContent = s.name || '';
            document.getElementById('modalAge').textContent = s.age ?? '';
            document.getElementById('modalCourse').textContent = s.course || '';
            document.getElementById('modalEmail').textContent = s.email || '';
            modal.style.display = 'block';
        }
 
        closeBtn.addEventListener('click', () => modal.style.display = 'none');
        window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });
    </script>
 
</body>
 
</html>
